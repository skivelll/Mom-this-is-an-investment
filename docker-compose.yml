services:
  db:
    image: postgres:18-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-mom_this_is_an_investment}
      POSTGRES_USER: ${POSTGRES_USER:-mti}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-mti}
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-mti} -d ${POSTGRES_DB:-mom_this_is_an_investment}",
        ]
      interval: 5s
      timeout: 5s
      retries: 10

  db_test:
    image: postgres:18-alpine
    profiles: ["test"]
    environment:
      POSTGRES_DB: ${TEST_POSTGRES_DB:-mom_this_is_an_investment_test}
      POSTGRES_USER: ${POSTGRES_USER:-mti}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-mti}
    ports:
      - "${TEST_POSTGRES_PORT:-5434}:5432"
    volumes:
      - postgres_test_data:/var/lib/postgresql
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-mti} -d ${TEST_POSTGRES_DB:-mom_this_is_an_investment_test}",
        ]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-mti}:${POSTGRES_PASSWORD:-mti}@db:5432/${POSTGRES_DB:-mom_this_is_an_investment}
      APP_HOST: ${BACKEND_HOST:-0.0.0.0}
      APP_PORT: ${BACKEND_PORT:-8000}
      CORS_ALLOW_ORIGINS: ${CORS_ALLOW_ORIGINS:-http://localhost:3000}
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    volumes:
      - ./backend:/app
    command:
      [
        "/bin/sh",
        "-c",
        "python -m alembic -c alembic.ini upgrade head && python -m app.scripts.seed_dev && exec uvicorn app.main:app --host ${BACKEND_HOST:-0.0.0.0} --port ${BACKEND_PORT:-8000}",
      ]
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=2).read()\"",
        ]
      interval: 10s
      timeout: 5s
      retries: 10

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000/api/v1}
      INTERNAL_API_URL: ${INTERNAL_API_URL:-http://backend:8000/api/v1}
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
      - frontend_next:/app/.next
    command: ["npm", "run", "dev", "--", "--hostname", "0.0.0.0", "--port", "3000"]

volumes:
  postgres_data:
  postgres_test_data:
  frontend_node_modules:
  frontend_next:
