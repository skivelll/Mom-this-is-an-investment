name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:18-alpine
        env:
          POSTGRES_DB: mom_this_is_an_investment_test
          POSTGRES_USER: mti
          POSTGRES_PASSWORD: mti
        ports:
          - 5434:5432
        options: >-
          --health-cmd "pg_isready -U mti -d mom_this_is_an_investment_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql+asyncpg://mti:mti@127.0.0.1:5434/mom_this_is_an_investment_test
      TEST_DATABASE_URL: postgresql+asyncpg://mti:mti@127.0.0.1:5434/mom_this_is_an_investment_test
      JWT_SECRET_KEY: ci-local-development-secret-key
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"
      - run: python -m pip install --upgrade pip
      - run: pip install -r backend/requirements.txt
      - run: cd backend && python -m alembic -c alembic.ini upgrade head
      - run: ruff check backend/app backend/alembic backend/tests
      - run: ruff format --check backend/app backend/alembic backend/tests
      - run: python -m mypy backend/app/models backend/app/repositories backend/app/services backend/app/schemas backend/app/api backend/tests backend/app/scripts/create_admin.py backend/app/scripts/seed_dev.py
      - run: pytest

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: sudo rm -rf node_modules .next tsconfig.tsbuildinfo
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run test
      - run: npm run build

  compose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: cp .env.example .env
      - run: docker compose -p mom-investment-ci build

  e2e:
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: cp .env.example .env
      - run: docker compose -p mom-investment-e2e up -d --build db backend frontend
      - run: |
          for i in {1..60}; do
            if curl -fsS http://localhost:3000 >/dev/null && curl -fsS http://localhost:8000/health >/dev/null; then
              exit 0
            fi
            sleep 2
          done
          docker compose -p mom-investment-e2e ps
          docker compose -p mom-investment-e2e logs --no-color backend frontend
          exit 1
      - run: sudo rm -rf node_modules .next tsconfig.tsbuildinfo
        working-directory: frontend
      - run: npm ci
        working-directory: frontend
      - run: npx playwright install --with-deps chromium
        working-directory: frontend
      - run: npm run test:e2e
        working-directory: frontend
        env:
          E2E_BASE_URL: http://localhost:3000
          E2E_API_URL: http://localhost:8000/api/v1
      - if: failure()
        run: docker compose -p mom-investment-e2e logs --no-color
      - if: always()
        run: docker compose -p mom-investment-e2e down -v
      - if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report
          if-no-files-found: ignore
